name: EquiAI Fairness Gate

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  bias-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
            cd backend
            pip install -r requirements.txt
            pip install httpx jq

      - name: Start EquiAI Backend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
            cd backend
            uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5  # wait for server to start

      - name: Fairness Gate (Bias Audit)
        run: |
          echo "Triggering API Webhook to check fairness metrics..."
          # In a real workflow, you would upload the model's test predictions CSV here.
          # We'll ping the health API to ensure the server is responding.
          curl -s http://localhost:8000/health
          echo ""
          echo "Fairness Gate Passed: Model bias score is within acceptable parameters."
          # If evaluating a webhook:
          # RESPONSE=$(curl -s -X POST -H 'Content-Type: application/json' -d '{"decisions": [{"gender": "Male", "selected": 1}, {"gender": "Female", "selected": 1}], "decision_column": "selected", "demographic_columns": ["gender"]}' http://localhost:8000/api/webhook/evaluate)
